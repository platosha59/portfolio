<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Platonova — UX/UI Designer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F0E8;
            color: #1A1A1A;
        }

        /* ─────────────────────────────
           NAV
        ───────────────────────────── */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 60px;
        }

        .nav-logo {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #1A1A1A;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            font-size: 14px;
            color: #1A1A1A;
            text-decoration: none;
            letter-spacing: 0.03em;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .nav-links a:hover { opacity: 1; }

        .nav-contact {
            font-size: 14px;
            font-weight: 600;
            color: #C8392B;
            text-decoration: none;
            letter-spacing: 0.05em;
            border: 1.5px solid #C8392B;
            padding: 8px 20px;
            border-radius: 100px;
            transition: all 0.2s;
        }

        .nav-contact:hover {
            background: #C8392B;
            color: #fff;
        }

        /* ─────────────────────────────
           HERO
        ───────────────────────────── */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 40px 60px 80px;
            gap: 40px;
            min-height: calc(100vh - 90px);
        }

        .hero-left {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: #C8392B;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .hero-tag::before {
            content: '';
            width: 24px;
            height: 1.5px;
            background: #C8392B;
        }

        .hero-name {
            font-size: clamp(52px, 6vw, 88px);
            font-weight: 800;
            line-height: 1.0;
            letter-spacing: -0.03em;
            color: #1A1A1A;
            margin-bottom: 16px;
        }

        .hero-name span { color: #C8392B; }

        .hero-role {
            font-size: clamp(16px, 1.8vw, 22px);
            font-weight: 500;
            color: #1A1A1A;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
        }

        .tag-pill {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #1A1A1A;
            background: rgba(0,0,0,0.06);
            padding: 6px 14px;
            border-radius: 100px;
        }

        .hero-divider {
            width: 48px;
            height: 1.5px;
            background: #1A1A1A;
            opacity: 0.2;
            margin-bottom: 28px;
        }

        .hero-desc {
            font-size: 15px;
            line-height: 1.7;
            color: #3D3D3D;
            max-width: 380px;
            margin-bottom: 44px;
        }

        .hero-desc strong {
            color: #1A1A1A;
            font-weight: 600;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #C8392B;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 14px 28px;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.25s;
        }

        .btn-primary:hover {
            background: #A52D21;
            transform: translateY(-1px);
        }

        .btn-secondary {
            font-size: 14px;
            font-weight: 500;
            color: #1A1A1A;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-secondary:hover { opacity: 1; }

        .hero-stats {
            display: flex;
            gap: 36px;
            margin-top: 56px;
            padding-top: 36px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #1A1A1A;
            letter-spacing: -0.02em;
        }

        .stat-number span { color: #C8392B; }

        .stat-label {
            font-size: 12px;
            color: #3D3D3D;
            opacity: 0.7;
            letter-spacing: 0.04em;
        }

        /* RIGHT */
        .hero-right {
            position: relative;
            height: 580px;
        }

        .mockup-card {
            position: absolute;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.12), 0 8px 20px rgba(0,0,0,0.08);
        }

        .card-1 {
            width: 340px;
            height: 420px;
            top: 30px;
            right: 20px;
            background: #E8E0D5;
            transform: rotate(2deg);
        }

        .card-2 {
            width: 280px;
            height: 340px;
            top: 80px;
            left: 20px;
            background: #D4C9B8;
            transform: rotate(-3deg);
            z-index: 2;
        }

        .card-3 {
            width: 200px;
            height: 130px;
            bottom: 20px;
            right: 60px;
            background: #1A1A1A;
            z-index: 3;
            transform: rotate(1deg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .card-inner {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
        }

        .card-bar {
            height: 10px;
            border-radius: 100px;
            background: rgba(0,0,0,0.12);
        }

        .card-bar.short  { width: 60%; }
        .card-bar.medium { width: 80%; }
        .card-bar.full   { width: 100%; }

        .card-rect {
            flex: 1;
            border-radius: 8px;
            background: rgba(0,0,0,0.08);
        }

        .card-row { display: flex; gap: 8px; }

        .card-sq {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: rgba(0,0,0,0.1);
        }

        .card-1 .card-bar { background: rgba(0,0,0,0.1); }
        .card-1 .card-rect { background: rgba(0,0,0,0.07); }
        .card-2 .card-bar { background: rgba(0,0,0,0.13); }
        .card-2 .card-rect { background: rgba(0,0,0,0.09); }

        .card-3-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .card-3-value {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .card-3-sub {
            font-size: 11px;
            color: #C8392B;
            font-weight: 600;
            margin-top: 4px;
        }

        .badge-float {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #fff;
            border-radius: 100px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            z-index: 4;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22C55E;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .badge-text {
            font-size: 12px;
            font-weight: 600;
            color: #1A1A1A;
        }

        .section-num-hero {
            position: absolute;
            bottom: 40px;
            left: 60px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #1A1A1A;
            opacity: 0.25;
            text-transform: uppercase;
        }

        /* ─────────────────────────────
           WHAT I DO
        ───────────────────────────── */
        .what-i-do {
            padding: 100px 60px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 64px;
        }

        .section-num {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            color: #C8392B;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: clamp(40px, 5vw, 72px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #1A1A1A;
        }

        .section-subtitle {
            font-size: 15px;
            color: #3D3D3D;
            opacity: 0.6;
            max-width: 300px;
            line-height: 1.6;
            text-align: right;
        }

        .services-list {
            display: flex;
            flex-direction: column;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .service-row {
            display: grid;
            grid-template-columns: 48px 1fr 2fr auto;
            align-items: center;
            gap: 32px;
            padding: 26px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            cursor: default;
            transition: padding-left 0.3s ease;
            position: relative;
        }

        .service-row::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            width: 0;
            background: rgba(0,0,0,0.025);
            transition: width 0.3s ease;
        }

        .service-row:hover::before { width: 100%; }
        .service-row:hover { padding-left: 12px; }
        .service-row > * { position: relative; z-index: 1; }

        .service-index {
            font-size: 11px;
            font-weight: 700;
            color: #C8392B;
            letter-spacing: 0.06em;
            opacity: 0.8;
        }

        .service-name {
            font-size: 19px;
            font-weight: 700;
            color: #1A1A1A;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .service-desc {
            font-size: 14px;
            color: #3D3D3D;
            line-height: 1.6;
            opacity: 0.65;
        }

        .service-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #1A1A1A;
            background: rgba(0,0,0,0.07);
            padding: 6px 14px;
            border-radius: 100px;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s;
        }

        .service-row:hover .service-tag {
            background: #C8392B;
            color: #fff;
        }

        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .principles-card {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 36px 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        .principles-list {
            display: flex;
            flex-direction: column;
        }

        .principle-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            cursor: default;
            transition: padding-left 0.25s ease;
        }

        .principle-item:first-child { padding-top: 0; }
        .principle-item:last-child { border-bottom: none; padding-bottom: 0; }
        .principle-item:hover { padding-left: 8px; }

        .principle-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #C8392B;
        }

        .principle-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }

        .projects-card {
            background: #C8392B;
            border-radius: 20px;
            padding: 36px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .projects-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }

        .projects-list { display: flex; flex-direction: column; }

        .project-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            cursor: default;
            transition: padding-left 0.25s ease;
        }

        .project-row:last-child { border-bottom: none; padding-bottom: 0; }
        .project-row:hover { padding-left: 8px; }

        .project-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.01em;
        }

        .project-arrow {
            font-size: 16px;
            color: rgba(255,255,255,0.35);
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .project-row:hover .project-arrow {
            transform: translateX(5px);
            color: rgba(255,255,255,0.85);
        }

        /* ─────────────────────────────
           ABOUT
        ───────────────────────────── */
        .about {
            background: #141414;
            padding: 90px 60px;
            position: relative;
            overflow: hidden;
        }

        .about::before {
            content: '';
            position: absolute;
            top: -120px;
            right: -120px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200,57,43,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .about-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 72px;
        }

        .about-section-num {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            color: #C8392B;
            text-transform: uppercase;
        }

        .main-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 64px;
            align-items: start;
        }

        .about-left {
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding-top: 8px;
        }

        .about-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 4.5vw, 62px);
            font-weight: 700;
            color: #fff;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .about-title em {
            font-style: italic;
            color: #C8392B;
        }

        .about-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .about-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 6px 14px;
            border-radius: 100px;
        }

        .about-photo-wrap {
            width: 280px;
            flex-shrink: 0;
            position: relative;
        }

        .about-photo {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 16px;
            display: block;
            filter: grayscale(15%);
            background: #2a2a2a;
        }

        .photo-badge {
            position: absolute;
            bottom: 20px;
            left: -20px;
            background: #C8392B;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 10px 16px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .about-right {
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding-top: 8px;
        }

        .about-text-block {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .about-text-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        .about-text {
            font-size: 15px;
            color: rgba(255,255,255,0.65);
            line-height: 1.75;
        }

        .about-text strong {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
        }

        .values-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .value-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .value-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #C8392B;
            flex-shrink: 0;
        }

        .value-text {
            font-size: 14px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.01em;
        }

        .about-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            margin-top: 8px;
            align-self: flex-start;
            position: relative;
            padding-bottom: 4px;
        }

        .about-cta::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.3);
            transition: background 0.2s;
        }

        .about-cta:hover::after { background: #C8392B; }

        .cta-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            font-size: 13px;
            transition: background 0.2s, border-color 0.2s;
        }

        .about-cta:hover .cta-arrow {
            background: #C8392B;
            border-color: #C8392B;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            color: #C8392B;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .stat-sup {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 800;
            vertical-align: super;
            color: #C8392B;
        }

        .stat-label-about {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.03em;
            line-height: 1.4;
        }

        /* ─────────────────────────────
           PROJECTS
        ───────────────────────────── */
        .projects-section {
            padding: 100px 60px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .projects-section-num {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            color: #C8392B;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .projects-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(52px, 7vw, 96px);
            font-weight: 700;
            color: #1A1A1A;
            line-height: 1;
            letter-spacing: -0.02em;
            margin-bottom: 56px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid rgba(0,0,0,0.12);
            border-left: 1px solid rgba(0,0,0,0.12);
        }

        .project-card {
            display: flex;
            flex-direction: row;
            border-right: 1px solid rgba(0,0,0,0.12);
            border-bottom: 1px solid rgba(0,0,0,0.12);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease;
            min-height: 280px;
        }

        .project-card:hover { background: rgba(0,0,0,0.02); }

        .card-info {
            padding: 32px 28px 28px 32px;
            display: flex;
            flex-direction: column;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .card-num {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: rgba(0,0,0,0.2);
            margin-bottom: 14px;
        }

        .card-tag {
            display: inline-flex;
            align-items: center;
            align-self: flex-start;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #C8392B;
            background: rgba(200,57,43,0.08);
            padding: 5px 12px;
            border-radius: 100px;
            margin-bottom: 14px;
            line-height: 1;
        }

        .card-name {
            font-size: 20px;
            font-weight: 700;
            color: #1A1A1A;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .card-type {
            font-size: 13px;
            font-weight: 500;
            color: rgba(0,0,0,0.4);
